<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>AI Resume Builder</title>

    <meta name="google-site-verification" content="IlGjejqFxmH952zhDXYUrWWMc_KUeS-ZK-UPr-EU7vY" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f5f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #2563eb;
        }

        .section {
            margin-top: 25px;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #2563eb;
            padding-bottom: 5px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            height: 80px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

<h1>🚀 AI Resume Builder</h1>


<form action="/generate" method="POST">


<div class="section">

<h2>Personal Details</h2>

<label>Name</label>
<input name="name" required>


<label>Email</label>
<input name="email" required>


<label>Phone</label>
<input name="phone">


<label>Location</label>
<input name="location">

</div>



<div class="section">

<h2>Professional Summary</h2>

<textarea name="summary"></textarea>

</div>



<div class="section">

<h2>Skills</h2>

<input name="skills" placeholder="Python, Java, AI, Flask">

</div>



<div class="section">

<h2>Education</h2>

<label>Degree</label>
<input name="degree">


<label>College</label>
<input name="college">


<label>Year</label>
<input name="year">

</div>




<div class="section">

<h2>Experience</h2>

<label>Company</label>
<input name="company">


<label>Role</label>
<input name="role">


<label>Duration</label>
<input name="duration">


<label>Description</label>
<textarea name="description"></textarea>

</div>




<div class="section">

<h2>Projects</h2>


<label>Project Title</label>
<input name="project">


<label>Project Description</label>
<textarea name="project_description"></textarea>


</div>



<button type="submit">
Generate Resume ✨
</button>


</form>


</div>


</body>
</html>
